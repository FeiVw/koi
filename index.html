<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爱的储蓄罐 - Love Token Economy</title>
    <style>
        :root {
            --pink-bg: #f5e6e8;
            --pink-primary: #d5a4a9;
            --pink-text: #8c6a6d;
            --blue-bg: #e1e5ea;
            --blue-primary: #9ba4b4;
            --blue-text: #394867;
            --white: #ffffff;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 角色主题变量 */
        body.role-girl {
            --theme-bg: var(--pink-bg);
            --theme-primary: var(--pink-primary);
            --theme-text: var(--pink-text);
        }

        body.role-boy {
            --theme-bg: var(--blue-bg);
            --theme-primary: var(--blue-primary);
            --theme-text: var(--blue-text);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--theme-bg);
            color: var(--theme-text);
            transition: var(--transition);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .role-switcher {
            display: flex;
            background: rgba(255, 255, 255, 0.5);
            padding: 5px;
            border-radius: 50px;
            width: 200px;
            position: relative;
        }

        .role-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            z-index: 1;
            transition: var(--transition);
            color: #999;
        }

        .role-btn.active { color: var(--theme-text); }

        .role-indicator {
            position: absolute;
            height: calc(100% - 10px);
            width: calc(50% - 5px);
            background: var(--white);
            border-radius: 50px;
            top: 5px;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        .role-boy .role-indicator { transform: translateX(100%); }

        .score-container { text-align: center; }
        .score-label { font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px; }
        .score-value { font-size: 2.5rem; font-weight: 800; font-variant-numeric: tabular-nums; }

        main { padding: 20px; max-width: 600px; margin: 0 auto; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px;
        }

        .section-title { font-size: 1.2rem; font-weight: 700; }

        .add-btn {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: var(--theme-primary); color: white; font-size: 1.5rem;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: var(--transition);
        }
        .add-btn:active { transform: scale(0.9); }

        .card-list { display: grid; gap: 15px; }
        .card {
            background: var(--white); padding: 20px; border-radius: 20px;
            box-shadow: var(--shadow); display: flex; justify-content: space-between;
            align-items: center; animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-info h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .card-info p { font-size: 0.85rem; opacity: 0.6; }

        .points-tag {
            background: var(--theme-bg); padding: 4px 12px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 700; color: var(--theme-primary);
        }

        .action-btn {
            padding: 8px 16px; border-radius: 12px; border: none;
            background: var(--theme-primary); color: white; font-weight: 600;
            cursor: pointer; transition: var(--transition);
        }
        .action-btn:active { transform: scale(0.95); }

        .secondary-btn {
            padding: 8px 12px; border-radius: 12px; border: 1px solid var(--theme-primary);
            background: transparent; color: var(--theme-primary); font-size: 0.8rem;
            cursor: pointer; transition: var(--transition);
        }
        .delete-btn { color: #ff4d4f; border-color: #ff4d4f; }
        .reject-btn { background: #ff4d4f !important; }

        /* 证据预览 */
        .evidence-preview {
            width: 100%; max-height: 150px; object-fit: cover;
            border-radius: 12px; margin: 10px 0; cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* 申请卡片特有样式 */
        .request-card { border: 2px dashed var(--theme-primary); }

        /* 记录列表 */
        .history-list {
            background: rgba(255, 255, 255, 0.5); border-radius: 20px;
            padding: 10px; max-height: 300px; overflow-y: auto;
            margin-top: 10px; border: 1px solid rgba(0,0,0,0.05);
        }
        .history-item {
            padding: 12px 10px; border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center;
        }
        .history-item:last-child { border-bottom: none; }

        /* 弹窗系统 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: var(--white); width: 90%; max-width: 400px; padding: 30px;
            border-radius: 25px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .modal h2 { margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.9rem; margin-bottom: 8px; opacity: 0.8; }
        .input-group input {
            width: 100%; padding: 12px; border: 2px solid var(--theme-bg);
            border-radius: 12px; outline: none; transition: var(--transition);
        }
        .input-group input:focus { border-color: var(--theme-primary); }

        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; }
        .cancel-btn { background: #eee; }
        .confirm-btn { background: var(--theme-primary); color: white; }

        #canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }

        @media (max-width: 480px) {
            .score-value { font-size: 2rem; }
            .card { padding: 15px; flex-direction: column; align-items: flex-start; gap: 15px; }
            .card div:last-child { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        }
    </style>
</head>
<body class="role-girl">
    <canvas id="canvas"></canvas>

    <header>
        <div class="role-switcher">
            <div class="role-indicator"></div>
            <button class="role-btn active" onclick="switchRole('girl')">女生</button>
            <button class="role-btn" onclick="switchRole('boy')">男生</button>
        </div>
        <div class="score-container">
            <p class="score-label"><span id="role-name">小主</span> 的当前积分</p>
            <div class="score-value" id="current-score">0</div>
        </div>
    </header>

    <main>
        <!-- 待处理申请 (收到申请) -->
        <section id="request-section" style="display: none; margin-bottom: 30px;">
            <div class="section-header">
                <h2 class="section-title">📩 收到申请 (待我审批)</h2>
            </div>
            <div id="request-list" class="card-list"></div>
        </section>

        <!-- 我的申请记录 (我发出的) -->
        <section id="my-request-section" style="display: none; margin-bottom: 30px;">
            <div class="section-header">
                <h2 class="section-title">📤 我的申请 (等待对方)</h2>
            </div>
            <div id="my-request-list" class="card-list"></div>
        </section>

        <!-- 任务部分 -->
        <section>
            <div class="section-header">
                <h2 class="section-title">✨ 悬赏任务</h2>
                <button class="add-btn" onclick="openModal('task')">+</button>
            </div>
            <div id="task-list" class="card-list"></div>
        </section>

        <!-- 愿望部分 -->
        <section style="margin-top: 40px;">
            <div class="section-header">
                <h2 class="section-title">🎁 愿望商店</h2>
                <button class="add-btn" onclick="openModal('wish')">+</button>
            </div>
            <div id="wish-list" class="card-list"></div>
        </section>

        <!-- 积分变动记录 -->
        <section style="margin-top: 40px;">
            <div class="section-header">
                <h2 class="section-title">📜 积分变动记录</h2>
            </div>
            <div id="history-list" class="history-list"></div>
        </section>
    </main>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">添加项目</h2>
            <div class="input-group">
                <label>名称</label>
                <input type="text" id="input-name" placeholder="请输入名称">
            </div>
            <div class="input-group">
                <label>积分奖励/消耗</label>
                <input type="number" id="input-points" placeholder="请输入积分数值">
            </div>
            <div class="input-group" id="evidence-group" style="display: none;">
                <label>证据图片</label>
                <input type="file" id="input-file" accept="image/*">
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeModal()">取消</button>
                <button class="confirm-btn" onclick="handleConfirm()">确认</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心状态 ---
        let state = {
            currentRole: 'girl',
            scores: { girl: 0, boy: 0 },
            tasks: [
                { id: 1, name: '洗碗', points: 20, creator: 'girl' },
                { id: 2, name: '取快递', points: 10, creator: 'boy' }
            ],
            wishes: [
                { id: 101, name: '清空购物车', points: 500, creator: 'girl' },
                { id: 102, name: '一次按摩', points: 50, creator: 'boy' }
            ],
            requests: [], // { id, type, name, points, requester, targetRole, image }
            history: []   // { id, text, time }
        };

        const STORAGE_KEY = 'love_token_data_v3';

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) state = JSON.parse(saved);
            renderAll();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function switchRole(role) {
            state.currentRole = role;
            document.body.className = `role-${role}`;
            document.querySelectorAll('.role-btn').forEach(btn => {
                const isGirlBtn = btn.innerText === '女生';
                const isBoyBtn = btn.innerText === '男生';
                btn.classList.toggle('active', (role === 'girl' && isGirlBtn) || (role === 'boy' && isBoyBtn));
            });
            renderAll();
            saveData();
        }

        function renderAll() {
            const role = state.currentRole;
            document.getElementById('role-name').innerText = role === 'girl' ? '小主' : '大侠';
            animateScore(state.scores[role]);

            // 1. 收到申请 (待我审批)
            const myRequests = state.requests.filter(r => r.targetRole === role);
            const reqSection = document.getElementById('request-section');
            if (myRequests.length > 0) {
                reqSection.style.display = 'block';
                document.getElementById('request-list').innerHTML = myRequests.map(req => `
                    <div class="card request-card">
                        <div class="card-info">
                            <h3>${req.name}</h3>
                            <p>${req.requester === 'girl' ? '小主' : '大侠'} 申请${req.type === 'task' ? '完成任务' : '兑换愿望'}</p>
                            ${req.image ? `<img src="${req.image}" class="evidence-preview" onclick="window.open(this.src)">` : ''}
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 8px; align-items: flex-end;">
                            <span class="points-tag">${req.type === 'task' ? '+' : '-'}${req.points}</span>
                            <div style="display: flex; gap: 8px;">
                                <button class="action-btn reject-btn" onclick="rejectRequest(${req.id})">不准</button>
                                <button class="action-btn" onclick="approveRequest(${req.id})">准了</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                reqSection.style.display = 'none';
            }

            // 1.5 我的申请记录 (等待对方审批)
            const myPendingRequests = state.requests.filter(r => r.requester === role);
            const myReqSection = document.getElementById('my-request-section');
            if (myPendingRequests.length > 0) {
                myReqSection.style.display = 'block';
                document.getElementById('my-request-list').innerHTML = myPendingRequests.map(req => `
                    <div class="card request-card" style="border-style: solid; opacity: 0.9;">
                        <div class="card-info">
                            <h3>${req.name}</h3>
                            <p>等待 ${req.targetRole === 'girl' ? '小主' : '大侠'} 审批...</p>
                            ${req.image ? `<img src="${req.image}" class="evidence-preview" onclick="window.open(this.src)">` : ''}
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 8px; align-items: flex-end;">
                            <span class="points-tag">${req.type === 'task' ? '+' : '-'}${req.points}</span>
                            <div style="display: flex; gap: 8px;">
                                <button class="secondary-btn" onclick="deleteRequest(${req.id})">撤销</button>
                                ${req.type === 'task' ? `<button class="secondary-btn" onclick="openModal('request_edit', ${req.id})">修改证据</button>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                myReqSection.style.display = 'none';
            }

            // 2. 任务列表
            document.getElementById('task-list').innerHTML = state.tasks.map(task => `
                <div class="card">
                    <div class="card-info" ${task.creator === role ? `onclick="openModal('task', ${task.id})"` : ''}>
                        <h3>${task.name}</h3>
                        <p>来自 ${task.creator === 'girl' ? '小主' : '大侠'} 的发布</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="points-tag">+${task.points}</span>
                        ${task.creator !== role ? `<button class="action-btn" onclick="openModal('task_apply', ${task.id})">申请完成</button>` : ''}
                        ${task.creator === role ? `<button class="secondary-btn delete-btn" onclick="deleteItem('task', ${task.id})">×</button>` : ''}
                    </div>
                </div>
            `).join('');

            // 3. 愿望列表
            document.getElementById('wish-list').innerHTML = state.wishes.map(wish => `
                <div class="card">
                    <div class="card-info" ${wish.creator === role ? `onclick="openModal('wish', ${wish.id})"` : ''}>
                        <h3>${wish.name}</h3>
                        <p>来自 ${wish.creator === 'girl' ? '小主' : '大侠'} 的愿望</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="points-tag">-${wish.points}</span>
                        ${wish.creator !== role ? `<button class="action-btn" onclick="confirmRedeemWish(${wish.id})">申请兑换</button>` : ''}
                        ${wish.creator === role ? `<button class="secondary-btn delete-btn" onclick="deleteItem('wish', ${wish.id})">×</button>` : ''}
                    </div>
                </div>
            `).join('');

            // 4. 历史记录
            const historyList = document.getElementById('history-list');
            if (state.history.length === 0) {
                historyList.innerHTML = '<div style="text-align:center; padding: 20px; opacity: 0.5;">暂无记录</div>';
            } else {
                historyList.innerHTML = state.history.slice().reverse().map(h => `
                    <div class="history-item">
                        <span>${h.text}</span>
                        <span style="opacity:0.4; font-size: 0.75rem;">${h.time}</span>
                    </div>
                `).join('');
            }
        }

        function animateScore(target) {
            const el = document.getElementById('current-score');
            const start = parseInt(el.innerText) || 0;
            const duration = 500;
            const startTime = performance.now();
            function update(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                el.innerText = Math.floor(start + (target - start) * progress);
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function confirmRedeemWish(id) {
            const wish = state.wishes.find(w => w.id === id);
            if (!wish) return;
            if (state.scores[state.currentRole] < wish.points) return alert('积分不足，快去赚取吧！');
            if (confirm(`兑换 [${wish.name}] 需要消耗 ${wish.points} 积分，并向对方发送兑现申请，确定吗？`)) {
                const role = state.currentRole;
                state.requests.push({
                    id: Date.now(),
                    type: 'wish',
                    name: wish.name,
                    points: wish.points,
                    requester: role,
                    targetRole: role === 'girl' ? 'boy' : 'girl'
                });
                alert('申请已发送，等待对方确认~');
                renderAll(); saveData();
            }
        }

        function approveRequest(id) {
            const reqIndex = state.requests.findIndex(r => r.id === id);
            if (reqIndex === -1) return;
            const req = state.requests[reqIndex];
            if (!confirm(`确定要批准 [${req.requester === 'girl' ? '小主' : '大侠'}] 的 [${req.name}] 申请吗？`)) return;

            const requesterName = req.requester === 'girl' ? '小主' : '大侠';
            if (req.type === 'wish') {
                if (state.scores[req.requester] < req.points) {
                    alert('对方积分突然不够了，申请失效');
                    state.requests.splice(reqIndex, 1);
                } else {
                    state.scores[req.requester] -= req.points;
                    addHistory(`${requesterName} 兑现了愿望 [${req.name}]，消耗 ${req.points} 积分`);
                    state.requests.splice(reqIndex, 1);
                    alert('已准予兑现！');
                }
            } else {
                state.scores[req.requester] += req.points;
                addHistory(`${requesterName} 完成了任务 [${req.name}]，获得 ${req.points} 积分`);
                createHeartEffect();
                state.requests.splice(reqIndex, 1);
                alert('奖励已发放！');
            }
            renderAll(); saveData();
        }

        function rejectRequest(id) {
            const reqIndex = state.requests.findIndex(r => r.id === id);
            if (reqIndex === -1) return;
            if (confirm(`确定要拒绝这个申请吗？`)) {
                state.requests.splice(reqIndex, 1);
                renderAll(); saveData();
            }
        }

        function deleteRequest(id) {
            if (confirm('确定要撤销这个申请吗？')) {
                const idx = state.requests.findIndex(r => r.id === id);
                if (idx !== -1) {
                    state.requests.splice(idx, 1);
                    renderAll(); saveData();
                }
            }
        }

        function deleteItem(type, id) {
            if (confirm('确定要删除这项内容吗？')) {
                const list = type === 'task' ? state.tasks : state.wishes;
                const idx = list.findIndex(i => i.id === id);
                if (idx !== -1) { list.splice(idx, 1); renderAll(); saveData(); }
            }
        }

        function addHistory(text) {
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
            state.history.push({ id: Date.now(), text, time: timeStr });
            if (state.history.length > 50) state.history.shift();
        }

        let currentModalType = '';
        let editingId = null;

        function openModal(type, id = null) {
            currentModalType = type;
            editingId = id;
            const title = document.getElementById('modal-title');
            const nameIn = document.getElementById('input-name');
            const pointsIn = document.getElementById('input-points');
            const evidenceGrp = document.getElementById('evidence-group');
            const fileIn = document.getElementById('input-file');

            evidenceGrp.style.display = 'none';
            nameIn.readOnly = false; pointsIn.readOnly = false;
            fileIn.value = '';

            if (type === 'task_apply' || type === 'request_edit') {
                const item = type === 'task_apply' ? state.tasks.find(t => t.id === id) : state.requests.find(r => r.id === id);
                title.innerText = type === 'task_apply' ? '申请完成任务' : '修改申请证据';
                nameIn.value = item.name; pointsIn.value = item.points;
                nameIn.readOnly = true; pointsIn.readOnly = true;
                evidenceGrp.style.display = 'block';
            } else if (id) {
                const item = (type === 'task' ? state.tasks : state.wishes).find(i => i.id === id);
                title.innerText = type === 'task' ? '修改任务' : '修改愿望';
                nameIn.value = item.name; pointsIn.value = item.points;
            } else {
                title.innerText = type === 'task' ? '发布新任务' : '添加愿望券';
                nameIn.value = ''; pointsIn.value = '';
            }
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function handleConfirm() {
            if (currentModalType === 'task_apply' || currentModalType === 'request_edit') {
                const file = document.getElementById('input-file').files[0];
                if (currentModalType === 'task_apply' && !file) return alert('请上传证据图片');
                
                const processApply = (imageData = null) => {
                    if (currentModalType === 'task_apply') {
                        const task = state.tasks.find(t => t.id === editingId);
                        state.requests.push({
                            id: Date.now(), type: 'task', name: task.name, points: task.points,
                            requester: state.currentRole, targetRole: state.currentRole === 'girl' ? 'boy' : 'girl',
                            image: imageData
                        });
                        alert('申请已提交，请等待对方审核证据~');
                    } else {
                        const req = state.requests.find(r => r.id === editingId);
                        if (imageData) req.image = imageData;
                        alert('证据已更新~');
                    }
                    renderAll(); saveData(); closeModal();
                };

                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => processApply(e.target.result);
                    reader.readAsDataURL(file);
                } else {
                    processApply();
                }
                return;
            }

            const name = document.getElementById('input-name').value.trim();
            const points = parseInt(document.getElementById('input-points').value);
            if (!name || isNaN(points) || points <= 0) return alert('请输入有效的名称和正整数积分');

            const list = currentModalType === 'task' ? state.tasks : state.wishes;
            if (editingId) {
                const item = list.find(i => i.id === editingId);
                item.name = name; item.points = points;
            } else {
                list.push({ id: Date.now(), name, points, creator: state.currentRole });
            }
            renderAll(); saveData(); closeModal();
        }

        // --- 特效 ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() {
                this.x = canvas.width / 2; this.y = canvas.height / 2;
                this.size = Math.random() * 15 + 10;
                this.speedX = Math.random() * 6 - 3; this.speedY = Math.random() * -10 - 2;
                this.opacity = 1; this.color = state.currentRole === 'girl' ? '#d5a4a9' : '#9ba4b4';
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.speedY += 0.2; this.opacity -= 0.02; }
            draw() {
                ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x - this.size/2, this.y - this.size/2, this.x - this.size, this.y + this.size/3, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x + this.size, this.y + this.size/3, this.x + this.size/2, this.y - this.size/2, this.x, this.y);
                ctx.fill();
            }
        }
        function createHeartEffect() { for (let i = 0; i < 20; i++) particles.push(new Particle()); }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => { p.update(); p.draw(); return p.opacity > 0; });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        loadData();
    </script>
</body>
</html>
