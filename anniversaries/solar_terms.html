<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二十四节气 - 纪念</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; background: #fdfaf5; display: flex; align-items: center; justify-content: center; font-family: "STKaiti", serif; color: #5d5c5c; }
        .frame { border: 1px solid #d4c4ac; padding: 60px; position: relative; max-width: 80%; text-align: center; }
        .frame::before, .frame::after { content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid #d4c4ac; }
        .frame::before { top: -10px; left: -10px; border-right: 0; border-bottom: 0; }
        .frame::after { bottom: -10px; right: -10px; border-left: 0; border-top: 0; }
        .term-icon { font-size: 5rem; margin-bottom: 20px; filter: grayscale(0.3); }
        h1 { font-size: 3rem; letter-spacing: 15px; margin: 10px 0; font-weight: normal; }
        p { font-size: 1.2rem; line-height: 1.8; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="frame">
        <div class="term-icon">🍂</div>
        <h1>岁时节令</h1>
        <p>顺应自然，四时有序。<br>愿每一个节气都有你陪伴在侧，<br>共赏朝暮，共度寒暑。</p>
    </div>
</body>
</html>
