<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一生一世 1314 天 - 纪念</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(to bottom, #2c3e50, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; font-family: sans-serif; overflow: hidden;
        }
        .text-glow {
            font-size: 5rem; font-weight: 900;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00de, 0 0 30px #ff00de;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            from { opacity: 0.8; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }
        .sub { margin-top: 30px; font-size: 1.5rem; letter-spacing: 10px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="text-glow">1314 DAYS</div>
    <div class="sub">一生一世 · 永不分离</div>
    <div style="position:absolute; bottom:50px; font-size:0.9rem; opacity:0.5;">FOREVER LOVE</div>
</body>
</html>
