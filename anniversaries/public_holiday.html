<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节日快乐 - 纪念</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; background: #fffafa; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .holiday-card { background: white; width: 85%; max-width: 400px; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .emoji { font-size: 5rem; margin-bottom: 20px; }
        h1 { color: #333; font-size: 2rem; margin-bottom: 15px; }
        p { color: #666; line-height: 1.6; font-size: 1.1rem; }
        .ribbon { background: #ff4d4f; color: white; padding: 5px 20px; border-radius: 50px; display: inline-block; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="holiday-card">
        <div class="emoji">🎐</div>
        <h1>国泰民安 · 岁岁欢愉</h1>
        <p>在这个特别的法定假期里，<br>放下繁忙，享受当下，<br>和你爱的人共享这份宁静与喜悦。</p>
        <div class="ribbon">HAPPY HOLIDAY</div>
    </div>
</body>
</html>
