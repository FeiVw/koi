<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱你 520 天 - 纪念</title>
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #fff0f5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'PingFang SC', sans-serif;
            color: #db7093;
        }
        .heart-box {
            position: relative; width: 300px; height: 300px;
            animation: heartBeat 1.2s infinite;
        }
        .heart {
            background-color: #ff69b4; display: inline-block;
            height: 100px; margin: 0 10px; position: relative;
            top: 100px; transform: rotate(-45deg); width: 100px;
        }
        .heart:before, .heart:after {
            content: ""; background-color: #ff69b4; border-radius: 50%;
            height: 100px; position: absolute; width: 100px;
        }
        .heart:before { top: -50px; left: 0; }
        .heart:after { left: 50px; top: 0; }
        
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .text {
            margin-top: 50px; text-align: center;
        }
        h1 { font-size: 3rem; letter-spacing: 5px; }
        p { font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="heart-box">
        <div class="heart"></div>
    </div>
    <div class="text">
        <h1>520 DAYS</h1>
        <p>关于喜欢你这件事，<br>我想用一生去表达。</p>
    </div>
</body>
</html>
