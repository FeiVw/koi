<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情人节快乐 - 纪念</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: #ffe4e1; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .rose-container {
            text-align: center; background: white; padding: 60px;
            border-radius: 100px 100px 10px 10px;
            box-shadow: 0 30px 100px rgba(219,112,147,0.3);
        }
        h1 { color: #dc143c; font-size: 3rem; margin: 20px 0; }
        .rose { font-size: 8rem; line-height: 1; }
        p { color: #db7093; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="rose-container">
        <div class="rose">🌹</div>
        <h1>VALENTINE'S DAY</h1>
        <p>玫瑰予你，心跳予你，<br>所有的美好都只想予你。</p>
    </div>
</body>
</html>
